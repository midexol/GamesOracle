name: Deploy brain to Render

on:
  push:
    branches: [main]
    paths:
      - 'server/**'
      - 'render.yaml'
      - '.github/workflows/deploy-brain.yml'

jobs:
  trigger-render-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render deploy hook
        run: |
          if [ -z "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" ]; then
            echo "RENDER_DEPLOY_HOOK_URL secret is not set — skipping." >&2
            exit 1
          fi
          curl -fsS -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"
